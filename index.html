<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.4);
    --accent: #5b8af5;
    --accent2: #a78bfa;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
    --yellow: #fbbf24;
    --pink: #f472b6;
    --radius: 14px;
    --font: 'Lexend', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 10%, rgba(91,138,245,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 90%, rgba(167,139,250,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 100px; }

  /* Header */
  .header {
    padding: 48px 0 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: rgba(255,255,255,0.15); }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* Category filters */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 20px;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-btn.active { color: #000; border-color: transparent; font-weight: 600; }

  /* Add task */
  .add-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .add-box:focus-within {
    border-color: rgba(91,138,245,0.5);
    box-shadow: 0 0 0 3px rgba(91,138,245,0.08);
  }

  .add-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 400;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
  }

  .add-input::placeholder { color: var(--muted); }

  .add-meta {
    display: none;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .add-meta.visible { display: flex; }

  .meta-select {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
  }

  .meta-select option { background: #1e2029; }

  .date-input {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 400;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    color-scheme: dark;
  }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #4a79e8; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* Section */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    margin-top: 8px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .section-count {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    color: #fff;
  }

  .toggle-completed {
    margin-left: auto;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .toggle-completed:hover { color: var(--text); }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 6px; }

  /* Task item */
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    animation: slideIn 0.25s ease;
    cursor: default;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover { border-color: rgba(255,255,255,0.12); }
  .task-item.completed { opacity: 0.5; }
  .task-item.dragging { opacity: 0.4; border-style: dashed; }
  .task-item.drag-over { border-color: var(--accent); border-style: dashed; }

  /* Checkbox */
  .check-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .check-btn:hover { border-color: rgba(255,255,255,0.5); transform: scale(1.1); }
  .check-btn.done { border-color: var(--green); background: var(--green); }

  .check-icon { display: none; }
  .check-btn.done .check-icon { display: block; }

  /* Task body */
  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.2s;
  }

  .task-item.completed .task-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .cat-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .due-badge {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .due-badge.overdue { color: var(--red); }
  .due-badge.today { color: var(--yellow); }

  /* Task actions */
  .task-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-item:hover .task-actions { opacity: 1; }

  .action-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn.delete:hover { background: rgba(248,113,113,0.15); color: var(--red); }

  /* Drag handle */
  .drag-handle {
    color: var(--muted);
    cursor: grab;
    font-size: 16px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    user-select: none;
  }
  .task-item:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 16px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-top: 6px; opacity: 0.7; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 99px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

  @media (max-width: 480px) {
    .header { padding: 32px 0 24px; }
    .logo { font-size: 28px; }
    .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">task<span>er</span></div>
    <div class="header-right">
      <span id="date-label" style="font-size:13px;color:var(--muted);font-weight:400;"></span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-remaining" style="color:var(--accent)">0</div>
      <div class="stat-label">Remaining</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-done" style="color:var(--green)">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-pct" style="color:var(--accent2)">0%</div>
      <div class="stat-label">Complete</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Category filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all" style="" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-cat="Work" onclick="setFilter('Work',this)">💼 Work</button>
    <button class="filter-btn" data-cat="Personal" onclick="setFilter('Personal',this)">👤 Personal</button>
    <button class="filter-btn" data-cat="Urgent" onclick="setFilter('Urgent',this)">🔥 Urgent</button>
    <button class="filter-btn" data-cat="Meetings" onclick="setFilter('Meetings',this)">👥 Meetings</button>
    <button class="filter-btn" data-cat="Admin" onclick="setFilter('Admin',this)">📄 Admin</button>
  </div>

  <!-- Add task -->
  <div class="add-box">
    <div class="add-row">
      <input class="add-input" id="add-input" placeholder="Add a new task..." 
             onfocus="showMeta()" onkeydown="if(event.key==='Enter')addTask()">
      <button class="btn btn-primary" id="add-btn" onclick="addTask()" disabled>Add</button>
    </div>
    <div class="add-meta" id="add-meta">
      <select class="meta-select" id="cat-select">
        <option value="Work">💼 Work</option>
        <option value="Personal">👤 Personal</option>
        <option value="Urgent">🔥 Urgent</option>
        <option value="Meetings">👥 Meetings</option>
        <option value="Admin">📄 Admin</option>
      </select>
      <input type="date" class="date-input" id="due-input">
      <button class="btn btn-ghost" onclick="hideMeta()" style="margin-left:auto">Cancel</button>
    </div>
  </div>

  <!-- Active tasks -->
  <div id="active-section">
    <div class="section-header">
      <span class="section-title">Active</span>
      <span class="section-count" id="active-count" style="background:var(--accent)">0</span>
    </div>
    <div class="task-list" id="active-list"></div>
  </div>

  <!-- Completed tasks -->
  <div id="completed-section" style="margin-top:24px">
    <div class="section-header">
      <span class="section-title">Completed</span>
      <span class="section-count" id="completed-count" style="background:var(--green)">0</span>
      <button class="toggle-completed" onclick="toggleCompleted()">
        <span id="toggle-icon">▼</span> <span id="toggle-label">Hide</span>
      </button>
    </div>
    <div class="task-list" id="completed-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tasker_v1';
let tasks = [];
let currentFilter = 'all';
let showCompletedSection = true;
let dragSrc = null;

const CATEGORIES = {
  Work:     { color: '#5b8af5', bg: 'rgba(91,138,245,0.15)',  icon: '💼' },
  Personal: { color: '#34d399', bg: 'rgba(52,211,153,0.15)',  icon: '👤' },
  Urgent:   { color: '#f87171', bg: 'rgba(248,113,113,0.15)', icon: '🔥' },
  Meetings: { color: '#fbbf24', bg: 'rgba(251,191,36,0.15)',  icon: '👥' },
  Admin:    { color: '#a78bfa', bg: 'rgba(167,139,250,0.15)', icon: '📄' },
};

// ── Persistence ───────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) tasks = JSON.parse(d);
  } catch(e) { tasks = []; }
  if (!tasks.length) seedTasks();
}

function seedTasks() {
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const nextWeek = new Date(today); nextWeek.setDate(today.getDate()+7);
  const fmt = d => d.toISOString().split('T')[0];

  tasks = [
    { id: uid(), title: 'Review Q1 report', category: 'Work', due: fmt(tomorrow), done: false, createdAt: Date.now() },
    { id: uid(), title: 'Team standup meeting', category: 'Meetings', due: fmt(today), done: false, createdAt: Date.now()-1000 },
    { id: uid(), title: 'Reply to client emails', category: 'Admin', due: fmt(tomorrow), done: false, createdAt: Date.now()-2000 },
    { id: uid(), title: 'Update project roadmap', category: 'Work', due: fmt(nextWeek), done: false, createdAt: Date.now()-3000 },
    { id: uid(), title: 'Book travel for conference', category: 'Personal', due: fmt(nextWeek), done: false, createdAt: Date.now()-4000 },
  ];
  save();
}

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const active = tasks.filter(t => !t.done && matchesFilter(t));
  const done   = tasks.filter(t =>  t.done && matchesFilter(t))
                      .sort((a,b) => (b.completedAt||0) - (a.completedAt||0));

  // Stats (use all tasks, not filtered)
  const allActive = tasks.filter(t => !t.done).length;
  const allDone   = tasks.filter(t =>  t.done).length;
  const total     = tasks.length;
  const pct       = total ? Math.round(allDone / total * 100) : 0;

  document.getElementById('stat-remaining').textContent = allActive;
  document.getElementById('stat-done').textContent = allDone;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('active-count').textContent = active.length;
  document.getElementById('completed-count').textContent = done.length;

  renderList('active-list', active, false);
  renderList('completed-list', done, true);

  document.getElementById('completed-list').style.display = showCompletedSection ? '' : 'none';
}

function matchesFilter(t) {
  return currentFilter === 'all' || t.category === currentFilter;
}

function renderList(id, items, isDone) {
  const el = document.getElementById(id);
  if (!items.length) {
    if (!isDone) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon">✅</div>
        <div class="empty-text">No tasks here!</div>
        <div class="empty-sub">Add a task above to get started.</div>
      </div>`;
    } else {
      el.innerHTML = '';
    }
    return;
  }

  el.innerHTML = items.map((t, i) => taskHTML(t, i, items.length, isDone)).join('');

  // Drag events for active list
  if (!isDone) {
    el.querySelectorAll('.task-item').forEach(row => {
      row.addEventListener('dragstart', onDragStart);
      row.addEventListener('dragover',  onDragOver);
      row.addEventListener('dragleave', onDragLeave);
      row.addEventListener('drop',      onDrop);
      row.addEventListener('dragend',   onDragEnd);
    });
  }
}

function taskHTML(t, idx, total, isDone) {
  const cat = CATEGORIES[t.category] || CATEGORIES.Work;
  const dueLabel = formatDue(t.due);
  const dueClass = dueLabel === 'Today' ? 'today' : dueLabel === 'Overdue' ? 'overdue' : '';

  return `<div class="task-item ${isDone ? 'completed' : ''}" 
               data-id="${t.id}" 
               draggable="${!isDone}">
    ${!isDone ? `<span class="drag-handle" title="Drag to reorder">⠿</span>` : ''}
    <button class="check-btn ${isDone ? 'done' : ''}" onclick="toggleDone('${t.id}')" title="${isDone ? 'Mark active' : 'Mark done'}">
      <svg class="check-icon" width="12" height="10" viewBox="0 0 12 10" fill="none">
        <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="cat-badge" style="color:${cat.color};background:${cat.bg}">${cat.icon} ${t.category}</span>
        ${dueLabel ? `<span class="due-badge ${dueClass}">📅 ${dueLabel}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      ${!isDone ? `
        <button class="action-btn" onclick="moveUp('${t.id}')" title="Move up" ${idx===0?'style="opacity:0.3;cursor:default"':''}>↑</button>
        <button class="action-btn" onclick="moveDown('${t.id}')" title="Move down" ${idx===total-1?'style="opacity:0.3;cursor:default"':''}>↓</button>
      ` : ''}
      <button class="action-btn delete" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
    </div>
  </div>`;
}

function formatDue(due) {
  if (!due) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00');
  if (d < today) return 'Overdue';
  if (d.getTime() === today.getTime()) return 'Today';
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  if (d.getTime() === tomorrow.getTime()) return 'Tomorrow';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('add-input');
  const title = input.value.trim();
  if (!title) return;

  const cat = document.getElementById('cat-select').value;
  const due = document.getElementById('due-input').value;

  tasks.unshift({ id: uid(), title, category: cat, due: due || null, done: false, createdAt: Date.now() });
  save(); render();

  input.value = '';
  document.getElementById('due-input').value = '';
  document.getElementById('add-btn').disabled = true;
  hideMeta();
  showToast('Task added ✓');
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completedAt = t.done ? Date.now() : null;
  save(); render();
  showToast(t.done ? 'Task completed 🎉' : 'Task reopened');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
  showToast('Task deleted');
}

function moveUp(id) {
  const active = tasks.filter(t => !t.done);
  const idx = active.findIndex(t => t.id === id);
  if (idx <= 0) return;
  const ti = tasks.findIndex(t => t.id === active[idx].id);
  const tj = tasks.findIndex(t => t.id === active[idx-1].id);
  [tasks[ti], tasks[tj]] = [tasks[tj], tasks[ti]];
  save(); render();
}

function moveDown(id) {
  const active = tasks.filter(t => !t.done);
  const idx = active.findIndex(t => t.id === id);
  if (idx < 0 || idx >= active.length - 1) return;
  const ti = tasks.findIndex(t => t.id === active[idx].id);
  const tj = tasks.findIndex(t => t.id === active[idx+1].id);
  [tasks[ti], tasks[tj]] = [tasks[tj], tasks[ti]];
  save(); render();
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.dataset.id);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (this !== dragSrc) this.classList.add('drag-over');
}

function onDragLeave() { this.classList.remove('drag-over'); }

function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  if (this === dragSrc) return;

  const srcId = dragSrc.dataset.id;
  const tgtId = this.dataset.id;
  const si = tasks.findIndex(t => t.id === srcId);
  const ti = tasks.findIndex(t => t.id === tgtId);
  if (si < 0 || ti < 0) return;

  const [item] = tasks.splice(si, 1);
  tasks.splice(ti, 0, item);
  save(); render();
}

function onDragEnd() {
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  dragSrc = null;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  if (cat !== 'all') {
    const c = CATEGORIES[cat];
    btn.style.background = c.color;
    btn.style.color = '#fff';
  } else {
    btn.style.background = 'var(--text)';
    btn.style.color = '#000';
  }
  render();
}

function showMeta() {
  document.getElementById('add-meta').classList.add('visible');
}

function hideMeta() {
  document.getElementById('add-meta').classList.remove('visible');
  document.getElementById('add-input').value = '';
  document.getElementById('add-btn').disabled = true;
}

function toggleCompleted() {
  showCompletedSection = !showCompletedSection;
  document.getElementById('toggle-icon').textContent = showCompletedSection ? '▼' : '▶';
  document.getElementById('toggle-label').textContent = showCompletedSection ? 'Hide' : 'Show';
  document.getElementById('completed-list').style.display = showCompletedSection ? '' : 'none';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('add-input').addEventListener('input', function() {
  document.getElementById('add-btn').disabled = !this.value.trim();
  if (this.value.trim()) showMeta();
});

// Set today's date label
const now = new Date();
document.getElementById('date-label').textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

// Set min date for due input
document.getElementById('due-input').min = now.toISOString().split('T')[0];

// Style the "All" filter active state on load
document.querySelector('.filter-btn.active').style.background = 'var(--text)';
document.querySelector('.filter-btn.active').style.color = '#000';

load();
render();
</script>
</body>
